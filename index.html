<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Field Map33</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/exif-js/2.3.0/exif.js"></script>
  <style>
    :root{
      --ink:#101827;
      --ink-soft:#1c2636;
      --paper:#FBFAF7;
      --field:#2F6F4F;
      --field-dark:#1F4E37;
      --amber:#E8A33D;
      --amber-dark:#C97F1C;
      --slate:#6B7280;
      --alert:#C4453A;
      --line: rgba(16,24,39,0.12);
      --mono: 'JetBrains Mono', ui-monospace, monospace;
      --sans: 'Inter', system-ui, -apple-system, sans-serif;
    }
    *{ box-sizing:border-box; }
    html,body{
      margin:0; padding:0; height:100%; width:100%;
      font-family:var(--sans); color:var(--ink); background:var(--paper);
      overflow:hidden;
    }
    #map{ position:absolute; inset:0; z-index:0; }
    .leaflet-container{ background:#E7E2D6; font-family:var(--sans); }

    /* ---------- Top bar ---------- */
    .topbar{
      position:absolute; top:12px; left:12px; right:12px; z-index:500;
      display:flex; align-items:center; gap:8px;
      pointer-events:none;
    }
    .brand{
      pointer-events:auto;
      background:var(--ink); color:var(--paper);
      padding:9px 14px; border-radius:10px;
      font-weight:700; font-size:14px; letter-spacing:0.02em;
      box-shadow:0 4px 14px rgba(16,24,39,0.25);
      display:flex; align-items:center; gap:8px;
    }
    .brand .dot{ width:8px; height:8px; border-radius:50%; background:var(--amber); }

    .status-pill{
      pointer-events:auto;
      margin-left:auto;
      background:#fff; border:1px solid var(--line);
      border-radius:10px; padding:7px 10px;
      display:flex; align-items:center; gap:10px;
      box-shadow:0 4px 14px rgba(16,24,39,0.12);
      font-size:12px;
    }
    .status-pill .stamp-label{ color:var(--slate); }
    .status-pill .stamp-time{
      font-family:var(--mono); font-weight:700; color:var(--field-dark);
      font-variant-numeric: tabular-nums;
    }
    .reload-btn{
      border:none; background:var(--field); color:#fff;
      width:30px; height:30px; border-radius:8px;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; flex-shrink:0;
      transition:transform 0.15s ease, background 0.15s ease;
    }
    .reload-btn:active{ transform:scale(0.9); }
    .reload-btn.loading svg{ animation:spin 0.9s linear infinite; }
    @keyframes spin{ to{ transform:rotate(360deg); } }

    /* ---------- FAB ---------- */
    .fab{
      position:absolute; right:16px; bottom:24px; z-index:500;
      width:58px; height:58px; border-radius:50%;
      background:var(--amber); border:none; cursor:pointer;
      box-shadow:0 8px 20px rgba(232,163,61,0.55), 0 2px 6px rgba(16,24,39,0.25);
      display:flex; align-items:center; justify-content:center;
      transition:transform 0.15s ease;
    }
    .fab:active{ transform:scale(0.92); }

    /* ---------- Bottom sheet ---------- */
    .scrim{
      position:absolute; inset:0; background:rgba(16,24,39,0.45);
      z-index:600; opacity:0; pointer-events:none; transition:opacity 0.2s ease;
    }
    .scrim.open{ opacity:1; pointer-events:auto; }

    .sheet{
      position:absolute; left:0; right:0; bottom:0; z-index:700;
      background:var(--paper);
      border-radius:18px 18px 0 0;
      box-shadow:0 -8px 30px rgba(16,24,39,0.35);
      transform:translateY(100%);
      transition:transform 0.28s cubic-bezier(.32,.72,0,1);
      max-height:88vh; overflow-y:auto;
      padding:10px 18px 22px;
    }
    .sheet.open{ transform:translateY(0); }
    .sheet-handle{
      width:38px; height:4px; border-radius:2px; background:var(--line);
      margin:6px auto 14px;
    }
    .sheet h2{
      margin:0 0 4px; font-size:17px; font-weight:700;
    }
    .sheet .sub{
      margin:0 0 16px; font-size:12.5px; color:var(--slate); line-height:1.5;
    }

    .photo-drop{
      border:1.5px dashed var(--line); border-radius:12px;
      padding:16px; text-align:center; cursor:pointer;
      display:flex; flex-direction:column; align-items:center; gap:8px;
      background:#fff; margin-bottom:14px;
      transition:border-color 0.15s ease;
    }
    .photo-drop.has-image{ border-style:solid; border-color:var(--field); padding:10px; }
    .photo-drop img{
      max-width:100%; max-height:180px; border-radius:8px; object-fit:cover;
    }
    .photo-drop .hint{ font-size:12.5px; color:var(--slate); }
    .photo-drop .hint b{ color:var(--ink); }

    .gps-readout{
      font-family:var(--mono); background:var(--ink); color:#8FE3B0;
      border-radius:10px; padding:12px 14px; margin-bottom:14px;
      display:grid; grid-template-columns:1fr 1fr; gap:4px 14px;
      font-size:13px;
    }
    .gps-readout .lbl{ color:#6B8E7A; font-size:10px; letter-spacing:0.08em; text-transform:uppercase; grid-column:1/-1; margin-top:4px; }
    .gps-readout .lbl:first-child{ margin-top:0; }
    .gps-readout .val{ grid-column:1/-1; font-weight:700; font-variant-numeric:tabular-nums; }
    .gps-readout.empty{ color:#B4553F; }
    .gps-readout .locate-btn{
      grid-column:1/-1; margin-top:8px;
      background:var(--amber); color:var(--ink); border:none;
      font-family:var(--sans); font-weight:600; font-size:12.5px;
      padding:8px 10px; border-radius:7px; cursor:pointer;
    }
    .coord-edit{
      display:grid; grid-template-columns:1fr 1fr; gap:8px; grid-column:1/-1; margin-top:6px;
    }
    .coord-edit input{
      width:100%; background:var(--ink-soft); border:1px solid #2b3a52; color:#8FE3B0;
      font-family:var(--mono); font-size:13px; padding:7px 8px; border-radius:6px;
    }

    .field-group{ margin-bottom:14px; }
    .field-group label{
      display:block; font-size:12px; font-weight:600; color:var(--slate);
      margin-bottom:6px; text-transform:uppercase; letter-spacing:0.04em;
    }
    .field-group textarea, .field-group input[type=text]{
      width:100%; border:1px solid var(--line); border-radius:9px;
      padding:10px 12px; font-family:var(--sans); font-size:14.5px;
      background:#fff; resize:vertical; min-height:44px;
    }
    .field-group textarea:focus, .field-group input:focus{
      outline:2px solid var(--field); outline-offset:1px;
    }

    .sheet-actions{ display:flex; gap:10px; margin-top:6px; }
    .btn{
      flex:1; border:none; border-radius:10px; padding:13px 14px;
      font-family:var(--sans); font-weight:700; font-size:14.5px; cursor:pointer;
      transition:opacity 0.15s ease;
    }
    .btn:disabled{ opacity:0.5; cursor:not-allowed; }
    .btn-primary{ background:var(--field); color:#fff; }
    .btn-ghost{ background:transparent; color:var(--slate); }

    input[type=file]{ display:none; }

    /* ---------- Toast ---------- */
    .toast{
      position:absolute; left:50%; bottom:100px; transform:translate(-50%, 12px);
      background:var(--ink); color:#fff; padding:10px 16px; border-radius:9px;
      font-size:13.5px; z-index:900; opacity:0; pointer-events:none;
      transition:opacity 0.2s ease, transform 0.2s ease;
      box-shadow:0 6px 20px rgba(16,24,39,0.35);
      max-width:80%; text-align:center;
    }
    .toast.show{ opacity:1; transform:translate(-50%, 0); }
    .toast.err{ background:var(--alert); }

    /* ---------- Marker popup ---------- */
    .leaflet-popup-content{ font-family:var(--sans); margin:10px 12px; }
    .popup-id{ font-family:var(--mono); font-weight:700; color:var(--field-dark); font-size:12.5px; }
    .popup-img{ width:100%; border-radius:8px; margin:6px 0; display:block; max-height:140px; object-fit:cover; }
    .popup-details{ font-size:13px; color:var(--ink); line-height:1.4; }
    .popup-time{ font-size:11px; color:var(--slate); margin-top:4px; font-family:var(--mono); }
    .pin-icon{
      width:22px; height:22px; border-radius:50% 50% 50% 0;
      background:var(--field); transform:rotate(-45deg);
      border:2px solid #fff; box-shadow:0 2px 6px rgba(16,24,39,0.4);
    }
  </style>
</head>
<body>

  <div id="map"></div>

  <div class="topbar">
    <div class="brand"><span class="dot"></span>Field Map</div>
    <div class="status-pill">
      <span class="stamp-label">โหลดล่าสุด</span>
      <span class="stamp-time" id="loadedAt">—</span>
      <button class="reload-btn" id="reloadBtn" title="โหลดข้อมูลใหม่">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline>
          <polyline points="1 20 1 14 7 14"></polyline>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
        </svg>
      </button>
    </div>
  </div>

  <button class="fab" id="fabBtn" title="เพิ่มรูปภาพ">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#101827" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
      <circle cx="12" cy="13" r="4"></circle>
    </svg>
  </button>

  <div class="scrim" id="scrim"></div>
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <h2>เพิ่มจุดข้อมูลใหม่</h2>
    <p class="sub">เลือกรูปจากกล้องหรืออัลบั้ม ระบบจะดึงพิกัด GPS จากไฟล์ภาพให้อัตโนมัติ (ถ้ามี) และย่อขนาดก่อนอัปโหลด</p>

    <label class="photo-drop" id="photoDrop">
      <img id="photoPreview" style="display:none">
      <svg id="photoIcon" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
        <circle cx="12" cy="13" r="4"></circle>
      </svg>
      <div class="hint" id="photoHint"><b>แตะเพื่อเลือกรูปภาพ11</b><br>ถ่ายด้วยกล้อง หรือเลือกจากอัลบั้ม</div>
      <input type="file" id="photoInput" accept="image/*" capture="environment"> 
    </label>

    <div class="gps-readout empty" id="gpsReadout">
      <span class="lbl">พิกัดจากภาพ (EXIF GPS)</span>
      <span class="val" id="gpsVal">ยังไม่พบพิกัด — เลือกรูปภาพก่อน</span>
      <div class="coord-edit" id="coordEdit" style="display:none">
        <input type="text" id="latInput" placeholder="ละติจูด">
        <input type="text" id="lngInput" placeholder="ลองจิจูด">
      </div>
      <button class="locate-btn" id="locateBtn" type="button">📍 ใช้ตำแหน่งปัจจุบันของอุปกรณ์แทน</button>
    </div>

    <div class="field-group">
      <label>รายละเอียด</label>
      <textarea id="detailsInput" placeholder="เช่น ชนิด, สภาพ, หมายเหตุภาคสนาม..."></textarea>
    </div>

    <div class="sheet-actions">
      <button class="btn btn-ghost" id="cancelBtn">ยกเลิก</button>
      <button class="btn btn-primary" id="saveBtn" disabled>บันทึกลงแผนที่</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
  // ===================== ตั้งค่า (CONFIG) =====================
  // วาง URL ของ Apps Script Web App (ที่ลงท้ายด้วย /exec) ที่ได้จากการ Deploy
  // ==============================================================
  const API_URL = 'https://script.google.com/macros/s/AKfycbwLKbF3_u4ZwPbktKFYV5iX72g6JZwua1xZ3y1qQVWuSU1no0q8dR0_ev16MtKoIT7XZA/exec';

  // ---------------- Map setup ----------------
  const map = L.map('map', { zoomControl:false }).setView([13.7563, 100.5018], 6);
  L.control.zoom({ position:'bottomleft' }).addTo(map);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  const markerLayer = L.layerGroup().addTo(map);
  const fieldIcon = L.divIcon({ className:'', html:'<div class="pin-icon"></div>', iconSize:[22,22], iconAnchor:[11,20] });

  function thumbUrl(driveFileId){
    return driveFileId ? ('https://drive.google.com/thumbnail?id=' + driveFileId + '&sz=w500') : '';
  }

  function renderPoints(points){
    markerLayer.clearLayers();
    if(!points || !points.length) return;
    const bounds = [];
    points.forEach(p=>{
      if(isNaN(p.lat) || isNaN(p.lng)) return;
      bounds.push([p.lat, p.lng]);
      const img = p.driveFileId ? '<img class="popup-img" src="'+thumbUrl(p.driveFileId)+'" loading="lazy">' : '';
      const savedTime = p.savedAt ? formatThaiTime(new Date(p.savedAt)) : '';
      const html =
        '<div class="popup-id">'+escapeHtml(p.id)+'</div>' +
        img +
        '<div class="popup-details">'+escapeHtml(p.details || '(ไม่มีรายละเอียด)')+'</div>' +
        '<div class="popup-time">บันทึกเมื่อ '+savedTime+'</div>';
      L.marker([p.lat, p.lng], { icon: fieldIcon }).bindPopup(html).addTo(markerLayer);
    });
    if(bounds.length) map.fitBounds(bounds, { padding:[40,40], maxZoom:16 });
  }

  function formatThaiTime(d){
    return d.toLocaleString('th-TH', { day:'2-digit', month:'2-digit', year:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit' });
  }
  function escapeHtml(s){
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ---------------- Load / Reload ----------------
  const loadedAtEl = document.getElementById('loadedAt');
  const reloadBtn = document.getElementById('reloadBtn');

  function loadData(){
    reloadBtn.classList.add('loading');
    fetch(API_URL + '?action=list')
      .then(r => r.json())
      .then(res => {
        reloadBtn.classList.remove('loading');
        if(res.error) throw new Error(res.error);
        renderPoints(res.points);
        loadedAtEl.textContent = formatThaiTime(new Date(res.loadedAt));
      })
      .catch(err => {
        reloadBtn.classList.remove('loading');
        showToast('โหลดข้อมูลไม่สำเร็จ: ' + err.message, true);
      });
  }
  reloadBtn.addEventListener('click', loadData);
  if(API_URL.indexOf('XXXX') !== -1){
    showToast('ยังไม่ได้ตั้งค่า API_URL — แก้ไขค่านี้ในไฟล์ index.html', true);
  } else {
    loadData();
  }

  // ---------------- Toast ----------------
  const toastEl = document.getElementById('toast');
  let toastTimer;
  function showToast(msg, isErr){
    toastEl.textContent = msg;
    toastEl.classList.toggle('err', !!isErr);
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=> toastEl.classList.remove('show'), 3200);
  }

  // ---------------- Sheet open/close ----------------
  const sheet = document.getElementById('sheet');
  const scrim = document.getElementById('scrim');
  const fabBtn = document.getElementById('fabBtn');
  const cancelBtn = document.getElementById('cancelBtn');

  function openSheet(){ sheet.classList.add('open'); scrim.classList.add('open'); }
  function closeSheet(){ sheet.classList.remove('open'); scrim.classList.remove('open'); resetForm(); }
  fabBtn.addEventListener('click', openSheet);
  cancelBtn.addEventListener('click', closeSheet);
  scrim.addEventListener('click', closeSheet);

  // ---------------- Photo handling ----------------
  const photoDrop = document.getElementById('photoDrop');
  const photoInput = document.getElementById('photoInput');
  const photoPreview = document.getElementById('photoPreview');
  const photoIcon = document.getElementById('photoIcon');
  const photoHint = document.getElementById('photoHint');
  const gpsReadout = document.getElementById('gpsReadout');
  const gpsVal = document.getElementById('gpsVal');
  const coordEdit = document.getElementById('coordEdit');
  const latInput = document.getElementById('latInput');
  const lngInput = document.getElementById('lngInput');
  const locateBtn = document.getElementById('locateBtn');
  const detailsInput = document.getElementById('detailsInput');
  const saveBtn = document.getElementById('saveBtn');

  const MAX_DIM = 1280;     // ความกว้าง/สูงสูงสุดหลังย่อ
  const JPEG_QUALITY = 0.82;

  let currentLat = null, currentLng = null;
  let resizedBase64 = null, resizedMime = 'image/jpeg', currentFileName = 'photo.jpg';

  function resetForm(){
    photoInput.value = '';
    photoPreview.style.display = 'none';
    photoIcon.style.display = 'block';
    photoHint.innerHTML = '<b>แตะเพื่อเลือกรูปภาพ</b><br>ถ่ายด้วยกล้อง หรือเลือกจากอัลบั้ม';
    photoDrop.classList.remove('has-image');
    gpsReadout.classList.add('empty');
    gpsVal.textContent = 'ยังไม่พบพิกัด — เลือกรูปภาพก่อน';
    coordEdit.style.display = 'none';
    detailsInput.value = '';
    currentLat = currentLng = null;
    resizedBase64 = null;
    saveBtn.disabled = true;
  }

  function updateCoordUI(lat, lng, source){
    currentLat = lat; currentLng = lng;
    gpsReadout.classList.remove('empty');
    gpsVal.textContent = lat.toFixed(6) + ', ' + lng.toFixed(6) + (source ? '  (' + source + ')' : '');
    latInput.value = lat.toFixed(6);
    lngInput.value = lng.toFixed(6);
    coordEdit.style.display = 'grid';
    validateForm();
  }

  function validateForm(){
    saveBtn.disabled = !(resizedBase64 && currentLat != null && currentLng != null && !isNaN(currentLat) && !isNaN(currentLng));
  }

  function convertDMSToDD(dms, ref){
    if(!dms || dms.length < 3) return null;
    let dd = dms[0] + dms[1]/60 + dms[2]/3600;
    if(ref === 'S' || ref === 'W') dd = -dd;
    return dd;
  }

  //photoDrop.addEventListener('click', (e)=>{ if(e.target !== photoInput) photoInput.click(); });

  photoInput.addEventListener('change', function(){
    const file = photoInput.files[0];
    if(!file) return;
    currentFileName = file.name || 'photo.jpg';

    // 1) อ่าน EXIF GPS จากไฟล์ต้นฉบับก่อนย่อขนาด
    EXIF.getData(file, function(){
      const lat = EXIF.getTag(this, 'GPSLatitude');
      const lon = EXIF.getTag(this, 'GPSLongitude');
      const latRef = EXIF.getTag(this, 'GPSLatitudeRef');
      const lonRef = EXIF.getTag(this, 'GPSLongitudeRef');
      if(lat && lon){
        const dd_lat = convertDMSToDD(lat, latRef);
        const dd_lng = convertDMSToDD(lon, lonRef);
        if(dd_lat != null && dd_lng != null){
          updateCoordUI(dd_lat, dd_lng, 'จากไฟล์ภาพ');
        }
      } else {
        gpsVal.textContent = 'ไม่พบพิกัดใน EXIF — กรอกเอง หรือใช้ตำแหน่งปัจจุบัน';
        coordEdit.style.display = 'grid';
      }
    });

    // 2) แสดงตัวอย่าง + ย่อขนาดภาพด้วย canvas
    const reader = new FileReader();
    reader.onload = function(e){
      const img = new Image();
      img.onload = function(){
        let w = img.width, h = img.height;
        if(w > MAX_DIM || h > MAX_DIM){
          if(w >= h){ h = Math.round(h * MAX_DIM / w); w = MAX_DIM; }
          else{ w = Math.round(w * MAX_DIM / h); h = MAX_DIM; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', JPEG_QUALITY);
        resizedBase64 = dataUrl.split(',')[1];
        resizedMime = 'image/jpeg';

        photoPreview.src = dataUrl;
        photoPreview.style.display = 'block';
        photoIcon.style.display = 'none';
        photoHint.innerHTML = '<b>' + escapeHtml(currentFileName) + '</b><br>ย่อขนาดเหลือ ' + w + '×' + h + ' px แล้ว';
        photoDrop.classList.add('has-image');
        validateForm();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });

  latInput.addEventListener('input', ()=>{ currentLat = parseFloat(latInput.value); gpsVal.textContent = 'แก้ไขด้วยตนเอง'; gpsReadout.classList.remove('empty'); validateForm(); });
  lngInput.addEventListener('input', ()=>{ currentLng = parseFloat(lngInput.value); gpsVal.textContent = 'แก้ไขด้วยตนเอง'; gpsReadout.classList.remove('empty'); validateForm(); });

  locateBtn.addEventListener('click', ()=>{
    if(!navigator.geolocation){ showToast('อุปกรณ์นี้ไม่รองรับ GPS', true); return; }
    locateBtn.textContent = 'กำลังค้นหาตำแหน่ง...';
    navigator.geolocation.getCurrentPosition(
      pos => { updateCoordUI(pos.coords.latitude, pos.coords.longitude, 'ตำแหน่งอุปกรณ์'); locateBtn.textContent = '📍 ใช้ตำแหน่งปัจจุบันของอุปกรณ์แทน'; },
      err => { showToast('ดึงตำแหน่งไม่สำเร็จ: ' + err.message, true); locateBtn.textContent = '📍 ใช้ตำแหน่งปัจจุบันของอุปกรณ์แทน'; },
      { enableHighAccuracy:true, timeout:10000 }
    );
  });

  // ---------------- Save ----------------
  saveBtn.addEventListener('click', function(){
    if(!resizedBase64 || currentLat == null || currentLng == null) return;
    saveBtn.disabled = true;
    saveBtn.textContent = 'กำลังอัปโหลด...';

    const payload = {
      action: 'save',
      base64: resizedBase64,
      mimeType: resizedMime,
      fileName: currentFileName,
      lat: currentLat,
      lng: currentLng,
      details: detailsInput.value.trim()
    };

    // หมายเหตุ: ใช้ Content-Type: text/plain โดยตั้งใจ (แทนที่จะเป็น application/json)
    // เพื่อให้ browser ส่งเป็น "simple request" ไม่เกิด CORS preflight (OPTIONS)
    // ซึ่ง Apps Script Web App ไม่รองรับการตอบ preflight โดยตรง
    fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    })
      .then(r => r.json())
      .then(res => {
        if(res.error) throw new Error(res.error);
        saveBtn.textContent = 'บันทึกลงแผนที่';
        showToast('บันทึก ' + res.record.id + ' สำเร็จ');
        closeSheet();
        loadData(); // รีโหลดข้อมูลจาก Sheet เพื่ออัปเดตแผนที่และเวลา
      })
      .catch(err => {
        saveBtn.disabled = false;
        saveBtn.textContent = 'บันทึกลงแผนที่';
        showToast('บันทึกไม่สำเร็จ: ' + err.message, true);
      });
  });
</script>
</body>
</html>
